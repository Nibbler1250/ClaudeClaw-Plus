name: Auto-sync upstream main

on:
  schedule:
    - cron: '0 6 * * *'  # 02:00 EDT / 02:00 EST
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Add upstream
        run: git remote add upstream https://github.com/TerrysPOV/ClaudeClaw-Plus.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check ahead
        id: check
        run: |
          AHEAD=$(git log HEAD..upstream/main --oneline | wc -l | tr -d ' ')
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "Upstream is $AHEAD commits ahead."

      - name: Merge upstream
        if: steps.check.outputs.ahead != '0'
        run: |
          if ! git merge upstream/main --no-edit -m "chore: auto-sync upstream main"; then
            git merge --abort
            exit 1
          fi

      - name: Push
        if: steps.check.outputs.ahead != '0'
        run: git push origin main

      - name: Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-sync upstream failed (${today})`,
              body: `Scheduled upstream sync failed.\n\nLikely cause: a custom commit on \`main\` of the fork conflicts with upstream.\n\n[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
